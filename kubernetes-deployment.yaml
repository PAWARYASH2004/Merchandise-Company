apiVersion: apps/v1
kind: Deployment
metadata:
  name: merchandise-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: merchandise
  template:
    metadata:
      labels:
        app: merchandise
    spec:
      containers:
      - name: merchandise-container
        image: merchandise-company:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: merchandise-service
spec:
  selector:
    app: merchandise
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer